version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment
  misspell:
    locale: US

formatters-settings:
  goimports:
    local-prefixes:
      - github.com/grokify/agent-protocols

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
